name: Build and Publish Release

on:
  push:
    tags:
      - 'v*' # Triggers on any tag that starts with 'v' (e.g., v1.0.0, v2.1)

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    
    # We need permission to write to the repository's releases
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for git archive to work properly on the tag

      - name: Create Clean Zip Archive
        run: |
          # Package only backend and extension, strictly obeying .gitignore
          git archive -o release.zip HEAD backend extension

      - name: Publish Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: release.zip
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
